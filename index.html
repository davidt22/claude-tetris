<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="theme-toggle">
      <span class="toggle-icon">🌙</span>
      <label class="toggle-switch" aria-label="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle-input" />
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-icon">☀️</span>
    </div>

    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <label class="label" for="skin-selector">SKIN</label>
          <select id="skin-selector">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="scores-panel panel-section">
          <span class="label">RÉCORDS</span>
          <ol id="high-scores-list"></ol>
          <button id="reset-scores-btn">Borrar récords</button>
        </div>
      </aside>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title">PAUSA</p>
        <button id="resume-btn">Reanudar</button>
        <button id="restart-btn">Reiniciar</button>
        <button id="controls-btn">Ver controles</button>
        <div id="controls-panel" class="hidden">
          <ul class="controls-list">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída rápida</li>
            <li><kbd>P</kbd> pausar</li>
          </ul>
        </div>
        <label class="start-level-label">Nivel inicial:
          <select id="start-level">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
          </select>
        </label>
      </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title gameover-title">GAME OVER</p>
        <p id="gameover-score"></p>
        <div id="score-entry" class="hidden">
          <p>¡Nuevo récord! Introduce tu nombre:</p>
          <input type="text" id="player-name" maxlength="10" placeholder="TU NOMBRE" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <button id="newgame-btn">Nueva partida</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
